<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>域名查询 - 王先生查询</title>
  <meta name="description" content="王先生查询提供专业的域名查询入口，支持域名输入、完整网址识别与 IDN 域名查询跳转。" />
  <meta name="robots" content="index,follow" />
  <meta name="format-detection" content="telephone=no,email=no,address=no" />
  <link rel="canonical" href="https://www.wxscx.com/" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="域名查询 - 王先生查询" />
  <meta property="og:description" content="专业的域名查询入口，支持域名输入、完整网址识别与 IDN 域名查询跳转。" />
  <meta property="og:url" content="https://www.wxscx.com/" />
  <meta property="og:site_name" content="王先生查询" />

  <style>
    :root {
      --bg: #f4f7fb;
      --card: rgba(255, 255, 255, 0.88);
      --card-strong: #ffffff;
      --line: rgba(15, 23, 42, 0.08);
      --text: #0f172a;
      --text-soft: #475569;
      --text-light: #64748b;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-soft: rgba(37, 99, 235, 0.08);
      --shadow-lg: 0 30px 80px rgba(15, 23, 42, 0.10);
      --shadow-md: 0 16px 36px rgba(15, 23, 42, 0.06);
      --radius-xl: 30px;
      --radius-md: 16px;
      --max-width: 860px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 18%, rgba(37, 99, 235, 0.10), transparent 24%),
        radial-gradient(circle at 85% 12%, rgba(59, 130, 246, 0.10), transparent 18%),
        radial-gradient(circle at 50% 100%, rgba(37, 99, 235, 0.06), transparent 24%),
        linear-gradient(180deg, #fbfdff 0%, var(--bg) 100%);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .wrap {
      width: 100%;
      max-width: var(--max-width);
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    .hero {
      position: relative;
      padding: 56px 48px 18px;
      text-align: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.72) 100%);
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      right: -70px;
      top: -90px;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.14) 0%, rgba(37, 99, 235, 0) 70%);
      pointer-events: none;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 14px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }

    h1 {
      position: relative;
      z-index: 1;
      font-size: clamp(34px, 5vw, 48px);
      line-height: 1.12;
      letter-spacing: -0.04em;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .intro {
      position: relative;
      z-index: 1;
      max-width: 620px;
      margin: 0 auto;
      font-size: 16px;
      color: var(--text-soft);
    }

    .search-section {
      padding: 26px 48px 0;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 72px;
      gap: 12px;
      align-items: center;
    }

    .search-box {
      position: relative;
      display: flex;
      align-items: center;
      min-height: 64px;
      padding: 0 50px 0 18px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--card-strong);
      box-shadow: var(--shadow-md);
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    .search-box:focus-within {
      border-color: rgba(37, 99, 235, 0.28);
      box-shadow:
        0 0 0 5px rgba(37, 99, 235, 0.08),
        0 18px 40px rgba(15, 23, 42, 0.08);
      transform: translateY(-1px);
    }

    .search-icon {
      width: 22px;
      height: 22px;
      margin-right: 12px;
      flex: 0 0 auto;
      color: var(--text-light);
    }

    .search-input {
      flex: 1;
      min-width: 0;
      height: 64px;
      border: none;
      outline: none;
      background: transparent;
      font-size: 17px;
      color: var(--text);
    }

    .search-input::placeholder {
      color: #94a3b8;
    }

    .clear-inside {
      position: absolute;
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 999px;
      background: #eef2f7;
      color: var(--text-light);
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .clear-inside:hover {
      background: #e2e8f0;
      color: var(--text);
    }

    .clear-inside.show {
      display: inline-flex;
    }

    .btn-primary {
      width: 72px;
      height: 64px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--primary), #3b82f6);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 18px 36px rgba(37, 99, 235, 0.22);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--primary-hover), #2563eb);
      transform: translateY(-1px);
      box-shadow: 0 20px 40px rgba(37, 99, 235, 0.26);
    }

    .btn-primary svg {
      width: 22px;
      height: 22px;
    }

    .message {
      display: none;
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-soft);
    }

    .message.show {
      display: block;
    }

    .message.error {
      color: #dc2626;
    }

    .message.success {
      color: #059669;
    }

    .content {
      padding: 48px 48px 36px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .section-card {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
    }

    h2 {
      font-size: 20px;
      line-height: 1.3;
      letter-spacing: -0.02em;
      margin-bottom: 14px;
    }

    .faq-list {
      display: grid;
      gap: 10px;
    }

    details {
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(15, 23, 42, 0.05);
      border-radius: var(--radius-md);
      padding: 14px 16px;
    }

    summary {
      list-style: none;
      cursor: pointer;
      font-weight: 700;
      color: var(--text);
      position: relative;
      padding-right: 24px;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    summary::after {
      content: "+";
      position: absolute;
      right: 0;
      top: 0;
      font-size: 18px;
      line-height: 1;
      color: var(--text-light);
    }

    details[open] summary::after {
      content: "−";
    }

    .faq-answer {
      margin-top: 10px;
      font-size: 14px;
      color: var(--text-soft);
    }

    .contact-box {
      font-size: 14px;
      color: var(--text-soft);
    }

    .contact-box a {
      color: var(--primary);
      font-weight: 700;
    }

    .footer {
      padding: 0 48px 36px;
      text-align: center;
      font-size: 13px;
      color: var(--text-light);
    }

    .footer a:hover {
      color: var(--primary);
    }

    @media (max-width: 720px) {
      .page {
        padding: 16px;
        align-items: flex-start;
      }

      .hero,
      .search-section,
      .content,
      .footer {
        padding-left: 20px;
        padding-right: 20px;
      }

      .hero {
        padding-top: 30px;
        padding-bottom: 12px;
      }

      .search-section {
        padding-top: 22px;
      }

      .content {
        padding-top: 40px;
      }
    }

    @media (max-width: 520px) {
      .search-row {
        grid-template-columns: minmax(0, 1fr) 58px;
        gap: 10px;
      }

      .search-box,
      .btn-primary {
        height: 58px;
        min-height: 58px;
        border-radius: 16px;
      }

      .search-box {
        padding-right: 46px;
      }

      .search-input {
        height: 58px;
        font-size: 16px;
      }

      .clear-inside {
        right: 12px;
      }

      .btn-primary {
        width: 58px;
      }

      .btn-primary svg {
        width: 20px;
        height: 20px;
      }
    }
  </style>

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "王先生查询",
      "url": "https://www.wxscx.com/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.wxscx.com/{search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  </script>

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "支持输入哪些内容？",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "支持直接输入域名，也支持粘贴完整网址，系统会自动识别并提取域名后跳转到查询结果页。"
          }
        },
        {
          "@type": "Question",
          "name": "是否支持中文域名或 IDN 域名？",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "支持。系统会对中文域名等 IDN 域名进行处理后再完成查询跳转。"
          }
        },
        {
          "@type": "Question",
          "name": "手机端是否可以正常使用？",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "可以。页面已针对桌面端与移动端进行了适配，支持触屏操作与键盘提交。"
          }
        }
      ]
    }
  </script>
</head>
<body>
  <main class="page">
    <div class="wrap">
      <section class="card" aria-labelledby="page-title">
        <header class="hero">
          <div class="brand">
            <a href="https://www.wangxiansheng.com" target="_blank" rel="noopener noreferrer">王先生</a>
          </div>
          <h1 id="page-title">域名查询</h1>
          <p class="intro">
            专业的域名查询入口，支持域名输入、完整网址自动识别与 IDN 域名查询跳转。
          </p>
        </header>

        <section class="search-section">
          <form id="queryForm" novalidate>
            <div class="search-row">
              <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.8"></circle>
                  <path d="M4 12H20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                  <path d="M12 4C14.2 6.2 15.5 9 15.5 12C15.5 15 14.2 17.8 12 20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                  <path d="M12 4C9.8 6.2 8.5 9 8.5 12C8.5 15 9.8 17.8 12 20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                </svg>
                <input
                  id="domainInput"
                  class="search-input"
                  type="text"
                  inputmode="url"
                  autocomplete="off"
                  placeholder="请输入域名"
                  aria-describedby="queryMessage"
                  autofocus
                />
                <button type="button" class="clear-inside" id="clearInside" aria-label="清空输入">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                    <path d="M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                  </svg>
                </button>
              </div>

              <button type="submit" class="btn-primary" aria-label="搜索">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="2"></circle>
                  <path d="M20 20L16.2 16.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                </svg>
              </button>
            </div>

            <div class="message" id="queryMessage" aria-live="polite"></div>
          </form>
        </section>

        <div class="content">
          <section class="section-card" aria-labelledby="faq-title">
            <h2 id="faq-title">常见问题</h2>
            <div class="faq-list">
              <details>
                <summary>支持输入哪些内容？</summary>
                <div class="faq-answer">
                  支持直接输入域名，也支持粘贴完整网址，系统会自动识别并提取域名后跳转到查询结果页。
                </div>
              </details>

              <details>
                <summary>是否支持中文域名或 IDN 域名？</summary>
                <div class="faq-answer">
                  支持。页面会对中文域名等 IDN 域名进行处理后再完成查询跳转。
                </div>
              </details>

              <details>
                <summary>手机端是否可以正常使用？</summary>
                <div class="faq-answer">
                  可以。页面已针对桌面端与移动端进行了适配，支持触屏操作与键盘提交。
                </div>
              </details>
            </div>
          </section>

          <section class="section-card" aria-labelledby="contact-title">
            <h2 id="contact-title">反馈联系</h2>
            <div class="contact-box">
              如需反馈问题、提交建议或商务联系，请发送邮件至
              <a href="mailto:lianxi@wangxiansheng.com">lianxi@wangxiansheng.com</a>
            </div>
          </section>
        </div>

        <footer class="footer">
          © <span id="year"></span>
          <a href="https://www.wangxiansheng.com" target="_blank" rel="noopener noreferrer">王先生</a>
          版权所有
        </footer>
      </section>
    </div>
  </main>

  <script>
    (function () {
      const form = document.getElementById("queryForm");
      const input = document.getElementById("domainInput");
      const message = document.getElementById("queryMessage");
      const clearInside = document.getElementById("clearInside");
      const year = document.getElementById("year");

      year.textContent = new Date().getFullYear();

      function setMessage(text, type) {
        if (!text) {
          message.textContent = "";
          message.className = "message";
          return;
        }

        message.textContent = text;
        message.className = "message show" + (type ? " " + type : "");
      }

      function updateClearButton() {
        if (input.value.trim()) {
          clearInside.classList.add("show");
        } else {
          clearInside.classList.remove("show");
        }
      }

      function normalizeDomain(value) {
        if (!value) return "";

        let result = value.trim();
        result = result.replace(/^https?:\/\//i, "");
        result = result.replace(/^www\./i, "");
        result = result.replace(/\/.*$/, "");
        result = result.replace(/:\d+$/, "");

        return result;
      }

      function toASCII(domain) {
        try {
          return new URL("http://" + domain).hostname.toLowerCase();
        } catch (e) {
          return domain.toLowerCase();
        }
      }

      function isValidDomain(domain) {
        return /^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?(?:\.[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?)+$/i.test(domain);
      }

      function goToQuery() {
        const raw = input.value;
        const normalized = normalizeDomain(raw);

        if (!normalized) {
          setMessage("请输入要查询的域名。", "error");
          input.focus();
          return;
        }

        const asciiDomain = toASCII(normalized);

        if (!isValidDomain(asciiDomain)) {
          setMessage("请输入有效的域名。", "error");
          input.focus();
          return;
        }

        window.location.href = "/" + encodeURIComponent(asciiDomain);
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        goToQuery();
      });

      clearInside.addEventListener("click", function () {
        input.value = "";
        setMessage("");
        updateClearButton();
        input.focus();
      });

      input.addEventListener("input", function () {
        if (message.textContent) setMessage("");
        updateClearButton();
      });

      updateClearButton();
    })();
  </script>
</body>
</html>
